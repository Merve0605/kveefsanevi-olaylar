<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dünyanın Kayıp Sırları</title>
    <!-- Tailwind CSS CDN'i -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - Antik ve Gizemli Fontlar -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cormorant Garamond', serif;
            background-color: #0c0b0a; /* Koyu, toprak rengi tonu */
            color: #d1d5db; /* Açık gri metin */
        }
        .cinzel-font {
            font-family: 'Cinzel Decorative', serif;
        }
        .story-container {
            background: rgba(18, 17, 16, 0.8);
            border: 1px solid rgba(139, 110, 81, 0.4); /* Antik kağıt kenarı efekti */
            backdrop-filter: blur(5px);
            animation: fadeIn 2s ease-in-out;
            cursor: pointer; /* Tıklanabilir olduğunu belirtmek için imleç değiştir */
        }
        .story-content {
            white-space: pre-wrap;
            line-height: 2;
            letter-spacing: 1px;
            text-align: justify;
        }
        .button-ancient {
            background-color: #5d4037;
            border-bottom: 3px solid #3e2723;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            transition: all 0.2s ease-in-out;
        }
        .button-ancient:hover {
            background-color: #7b584a;
            transform: translateY(-2px);
            border-bottom: 5px solid #3e2723;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-[#0c0b0a] text-[#d1d5db]">

    <!-- Ana Konteyner -->
    <div class="min-h-screen flex flex-col items-center justify-center p-4 md:p-8">

        <!-- Başlık -->
        <h1 class="cinzel-font text-5xl md:text-7xl font-bold text-center text-amber-500 mb-8 tracking-wide">
            Dünyanın Kayıp Sırları
        </h1>

        <!-- Hikaye Kutusu -->
        <div id="story-box" class="story-container rounded-3xl p-8 md:p-12 max-w-4xl w-full">
            <div id="story-header" class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 border-b border-[#5d4037] pb-4">
                <h2 id="story-title" class="cinzel-font text-3xl md:text-4xl font-bold text-white mb-2 md:mb-0"></h2>
                <div id="story-info" class="text-lg text-[#a19681]"></div>
            </div>
            <div id="story-content" class="story-content text-xl"></div>
        </div>

    </div>

    <script>
        // Hikayelerimizi bir obje içinde saklıyoruz
        const stories = {
            apollo: {
                title: "Apollo'nun Laneti",
                info: "Efsanevi Yıl: M.Ö. 5. Yüzyıl",
                content: `Apollo, kahinlik gücüyle bilinen yüce tanrı. Ancak Pythia'nın gölgeleri, onun bile göremediği kaderleri fısıldıyordu. Bir zamanlar, Delfi'nin derinliklerinde geleceği işleten kadın kahin, Apollo'ya bir kader söyledi: İçinde güzellik ve korku yatan bir kader. Tanrı, o günden sonra, hiç kimsenin seveceği bir kız çıkarmadı, çünkü bildiği tüm aşklar sefalet getirirdi.`
            },
            medusa: {
                title: "Medusa'nın Gözleri",
                info: "Efsanevi Yıl: M.Ö. 8. Yüzyıl",
                content: `Athena'nın tapınağında bir zamanlar güzelliği dillere destan bir rahibe yaşardı. O rahibenin adı Medusa idi. Poseidon'un lanetiyle, o eşsiz güzellik, yılanlar saçına dönüştü. Onun bakışı, taşa çevirirdi her canlıyı. Milyonlarca yıl sonra, bir kahraman çıkıp başını kesti, ve Medusa'nın gözleri hala insanları cezbetmeye devam etti.`
            },
            icarus: {
                title: "İkarus'un Düşüşü",
                info: "Efsanevi Yıl: M.Ö. 1. Yüzyıl",
                content: `Daedalus, Girit'in labirentinden kaçmak için kendi elleriyle kanatlar yaptı. Oğluna, İkarus'a, bu kanatlarla uçmanın sırrını verdi. "Ne güneşe çok yaklaş, ne denize çok inme," dedi. Ancak İkarus, gençliğinin coşkusuyla, tüm uyarıları unutup güneşe doğru uçtu. Mum kanatlar eridi, ve o, bu sonsuza dek anlatılan hikayenin kahramanı oldu.`
            },
            sisyphus: {
                title: "Sisifos'un Laneti",
                info: "Efsanevi Yıl: M.Ö. 6. Yüzyıl",
                content: `Zeki ve kurnaz Kral Sisifos, tanrıları aldatmaya cüret etti. Ölüm tanrısı Thanatos'u zincirleyerek dünyada kimsenin ölmesini engelledi. Ancak Olimpos'un öfkesi sınır tanımadı. Sisifos, cezalandırıldı: Sonsuzluğa kadar, bir kayanın bir dağın tepesine kadar itip yuvarlanmasına şahit olmak.`
            },
            pandora: {
                title: "Pandora'nın Kutusu",
                info: "Efsanevi Yıl: M.Ö. 7. Yüzyıl",
                content: `Zeus'un insanlığa bir hediyesiydi Pandora. Yanında, asla açmaması gereken bir kutu taşıyordu. O kutu, merakın fısıltılarıyla doluydu ve Pandora'nın kalbini kemiriyordu. En sonunda, dayanamadı ve açtı. Kutunun içinden çıkan bütün kötülükler, insanlığı baladı. Ama kutunun dibinde bir umut kalıyordu.`
            },
            gizapir: {
                title: "Gize'deki Keops Piramidi",
                info: "Harika Yıl: M.Ö. 2560",
                content: `Antik Mısır'ın kumları arasında yükselen devasa bir mezar. Sadece bir yapı değil, aynı zamanda yıldızlara uzanan bir sır perdesi. Firavunlar, ruhlarının sonsuza kadar yaşayabileceğine inanarak, bu muazzam anıtları yaptırdılar. Milyonlarca ton taşın, insanın gücü ve azmi ile nasıl yığıldığı, bugün hala bir sırdır.`
            },
            babil: {
                title: "Babil'in Asma Bahçeleri",
                info: "Harika Yıl: M.Ö. 600",
                content: `Çölün kalbinde, göğe uzanan yeşil bir rüya. Kral Nebukadnezar'ın, vatan hasreti çeken eşi için yaptırdığı bu bahçeler, mühendislik harikası olduğu kadar, bir sevgi anıtıydı. Su, çöl içinde, diye yaşamamış efsaneler. Ancak kaybolan bu harika, sadece tarih kitaplarında yaşıyor.`
            },
            zeus: {
                title: "Zeus Heykeli",
                info: "Harika Yıl: M.Ö. 435",
                content: `Olimpos'un kralı, yeryüzündeki tahtına oturmuştu. Phidias'ın ellerinde şekil alan bu heykel, altından cübbesi, fildişinden teniyle öylesine görkemliydi ki, onun karşısında durmak, tanrıları karşı karşıya gelmiş gibi hissettirirdi. Yüzyıllar boyunca ışık saçan bu sanat eseri, yangında yok oldu.`
            },
            artemis: {
                title: "Artemis Tapınağı",
                info: "Harika Yıl: M.Ö. 550",
                content: `Efesus'taki bu tapınak, tanrıça Artemis'e adanmıştı. Mermer sütunlar ve heykellerle süslü bu yapı, sadece bir ibadethane değil, aynı zamanda dünyanın dörtbir yanından gelen hacıların kalbi kütlüğünü tıkayacak kadar güzel bir yerdi. Ama, tüm güzellikleri rağmen, ateşler tarafından yutuldu.`
            },
            halicarnassus: {
                title: "Halikarnas Mozolesi",
                info: "Harika Yıl: M.Ö. 351",
                content: `Ölen bir krala duyulan sevginin eseri. Kral Mausolus'un mezarı, o kadar görkemliydi ki, adı (Mozole) artık tüm görkemli mezar yapıları için kullanıldı. Yüzlerce yıl boyunca mermerden yapılan heykelleri, depremlere ve zamanın tahrifatına başladı direnişe.`
            },
            rhodes: {
                title: "Rodos Heykeli",
                info: "Harika Yıl: M.Ö. 280",
                content: `Rodos limanının girişinde, devasa bir tanrı heykeli yükseliyordu. Güneş tanrısı Helios'u tasvir eden bu bronz heykel, o kadar büyüktü ki, gemiler bacaklarının arasında geçerdi. Bir deprem bu muhteşem heykeli yıktı, ve antik dünyanın şaşkınlığı sonsuza dek cembermiş oldu.`
            },
            alexandria: {
                title: "İskenderiye Feneri",
                info: "Harika Yıl: M.Ö. 280",
                content: `Geceleri denizcilere yol gösteren efsanevi bir ışık. İskenderiye Limanı'nın girişinde yükselen bu fener, mimari bir mucizeydi. Aynalar ve devasa bir ateşle dönüştürülen ışık, denizde kaybolan gemileri istikamete çevirirdi. Ama, tsunamiler ve depremlerin ardından, o ışık sonsuza için söndü.`
            },
            marianatrench: {
                title: "Mariana Çukuru",
                info: "Keşfedilmemiş Yıl: Günümüz",
                content: `Pasifik'in derinliklerinde, güneş ışığının ulaşamadığı bir yeraltı dünyası. Basıncın ezici bir güç olduğu bu yerde, hayaletimsi balıklar ve bioluminesan canlılar yaşarlar. İnsanların keşfettiği bu çukur, aydan daha az ziyaret edilmiş bir gizemdir.`
            },
            mountroraima: {
                title: "Roraima Dağı",
                info: "Keşfedilmemiş Yıl: Günümüz",
                content: `Venezuela, Brezilya ve Guyana'nın kesişiminde, bulutların üzerinde yüzen bir masa dağı. Dik yamaçları, burayı milyonlarca yıldır yeryüzünün geri kalanından ayırmıştır. Burada yaşayan bitki ve hayvanlar, başka yerde var olmayan türlerdir. Sanki dünyanın ilk günlerine ait bir cennettir.`
            },
            amazon: {
                title: "Amazon'un Bilinmeyen Kabileleri",
                info: "Keşfedilmemiş Yıl: Günümüz",
                content: `Amazon'un derin ormanlarında, modern dünyadan tamamen izole yaşayan kabileler var. Onların varlığı, uzaktan çekilen fotoğraflar ve nadir görülen işaretlerle bilinir. Kendi dilleri, kendi medeniyetleri, ve kendi hikayelerine sahip bu insanlar, hala bilinmeyen bir dünya yaşarlar.`
            },
            lith: {
                title: "Lith Efsanesi",
                info: "Türk Mitolojisi",
                content: `Gök Tanrı'nın en sadık hizmetkarlarından biri olan Lith, göklerin ve yerin dengesini korumakla görevliydi. Bir gün, yeryüzünde bir kargaşa baş gösterince, Lith ceza aldı. Cezalanı her gün ağırlaşan bir kaya taşımak oldu. Türk mitolojisinin bu gizli kahramanı, sadece bilenlerin kalplerine yaşar.`
            },
            sahmaran: {
                title: "Şahmaran",
                info: "Doğu Mitolojisi",
                content: `Anlatılır ki, yeraltında yılanların kraliçesi Şahmaran yaşardı. Yılanlar ona sonsuz bir sadakatle bağlıydı ve onun bilgeliği tüm evreni kapsardı. İnsanlar, Şahmaran'ın hikayesine kulaç verdikçe, büyülenirlerdi. Belki de bugün hala, koyu karanlıkta, o yılan kraliçesi hüküm sürüyor.`
            },
            gobeklitepe: {
                title: "Göbeklitepe",
                info: "İlk Tapınak: M.Ö. 10.000",
                content: `Şanlıurfa yakınlarındaki bu taş çemberleri, insanlık tarihindeki bilinen en eski tapınak. Avcı-toplayıcı topluluklar tarafından inşa edildiğine inanılıyor. Neden? Kimden korkularak? Ne ilah için? Bu sorular, hala arkeolojistleri dehşete düşürdüyor ve medeniyetin ilk sırlarını barındırıyor.`
            },
            nevalicori: {
                title: "Nevali Çori",
                info: "İlk Tapınak: M.Ö. 9.000",
                content: `Fırat Nehri kıyısında bulunan Nevali Çori, Göbeklitepe'ye benzer şekilde, tarım ve yerleşik hayattan önce inşa edilmiş bir tapınak. T şeklindeki dikilitaşlar, muasır sanat eserlerinin soyu sıra tükettiği bir çağda, böyle bir hassasiyeti nasıl mümkün kıldığını soruşturuyor. Belki de insanlık, unuttuğu bir çağa ait mirası bu yerde saklıyor.`
            },
            klausenhohle: {
                title: "Klausenhöhle Mağarası",
                info: "İlk Tapınak: M.Ö. 30.000",
                content: `Almanya'da bulunan bu mağara, Paleolitik döneme ait dini ritüellerin yapıldığına dair kanıtlar barındırıyor. Mağara duvarlarına çizilen hayvan resimleri ve semboller, insanın ruhsal dünyasının ilk ifadeleridir. O mağaraya girip duvarları okumak, insanlığın en derin anılarına dokunmak demektir.`
            }
        };

        // DOM elementlerini seçiyoruz
        const storyTitle = document.getElementById('story-title');
        const storyInfo = document.getElementById('story-info');
        const storyContent = document.getElementById('story-content');
        const storyBox = document.getElementById('story-box');
        const storyKeys = Object.keys(stories);
        let currentStoryIndex = 0;

        // Hikayeyi değiştiren ana fonksiyon
        function changeStory(storyKey) {
            const story = stories[storyKey];
            if (story) {
                // DOM'u güncellemeden önce animasyon sınıfını ekle
                storyBox.classList.remove('fadeIn');
                void storyBox.offsetWidth; // Force reflow to restart animation
                storyBox.classList.add('fadeIn');

                // DOM'u güncelliyoruz
                storyTitle.textContent = story.title;
                storyInfo.textContent = story.info;
                storyContent.textContent = story.content;
            }
        }
        
        // Slayt geçişi için bir sonraki hikayeye geçme fonksiyonu
        function nextStory() {
            currentStoryIndex = (currentStoryIndex + 1) % storyKeys.length;
            changeStory(storyKeys[currentStoryIndex]);
        }

        // Hikaye kutusuna tıklama olayını ekle
        storyBox.addEventListener('click', nextStory);

        // Sayfa yüklendiğinde varsayılan hikayeyi göster
        window.onload = function() {
            changeStory(storyKeys[currentStoryIndex]);
        };
    </script>
</body>
</html>
